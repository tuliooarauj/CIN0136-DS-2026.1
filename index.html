<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPlanner - IA</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #0a0a0a;
            --yellow: #f5c400;
            --yellow-dim: #a88900;
            --white: #f4f1eb;
            --surface: #161616;
            --surface2: #1f1f1f;
            --surface3: #2a2a2a;
            --border: rgba(255,255,255,0.08);
            --user-bg: #f5c400;
            --user-text: #0a0a0a;
            --ai-bg: #1f1f1f;
            --ai-text: #e8e4d9;
            --muted: #888;
            --radius: 12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--black);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-container {
            width: 720px;
            max-width: 100%;
            height: 92vh;
            max-height: 860px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .header-icon {
            width: 36px;
            height: 36px;
            background: var(--yellow);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .header-text h1 {
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--yellow);
            text-transform: uppercase;
        }
        .header-text p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-left: auto;
            box-shadow: 0 0 6px #4ade80;
        }

        /* ── CHAT BOX ── */
        .chat-box {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        .chat-box::-webkit-scrollbar { width: 5px; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

        /* ── MESSAGES ── */
        .message-row {
            display: flex;
            gap: 10px;
            animation: fadeUp 0.25s ease forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .avatar.ai  { background: var(--yellow); color: var(--black); font-family: 'Space Mono', monospace; }
        .avatar.usr { background: var(--surface3); color: var(--muted); }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: var(--radius);
            line-height: 1.6;
            font-size: 14.5px;
        }
        .bubble.ai-msg {
            background: var(--ai-bg);
            color: var(--ai-text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .bubble.user-msg {
            background: var(--user-bg);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        /* Markdown inside AI bubble */
        .bubble.ai-msg p  { margin: 0 0 8px; }
        .bubble.ai-msg p:last-child { margin: 0; }
        .bubble.ai-msg ul, .bubble.ai-msg ol { margin: 4px 0 8px 18px; }
        .bubble.ai-msg li { margin-bottom: 3px; }
        .bubble.ai-msg strong { color: var(--yellow); font-weight: 600; }
        .bubble.ai-msg h1, .bubble.ai-msg h2, .bubble.ai-msg h3 {
            font-family: 'Space Mono', monospace;
            color: var(--yellow);
            margin: 12px 0 6px;
            font-size: 13px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .bubble.ai-msg table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 13px;
        }
        .bubble.ai-msg th {
            background: var(--surface3);
            color: var(--yellow);
            padding: 7px 10px;
            text-align: left;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .bubble.ai-msg td {
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--ai-text);
        }
        .bubble.ai-msg tr:last-child td { border-bottom: none; }
        .bubble.ai-msg code {
            background: var(--surface3);
            color: var(--yellow);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }

        /* typing indicator */
        .typing-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            height: 18px;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--muted);
            border-radius: 50%;
            animation: dot 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* ── INPUT AREA ── */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--surface);
        }
        #user-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 16px;
            font-size: 14px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        #user-input::placeholder { color: var(--muted); }
        #user-input:focus { border-color: rgba(245,196,0,0.4); }

        #send-btn {
            background: var(--yellow);
            color: var(--black);
            border: none;
            border-radius: 10px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }
        #send-btn:hover  { background: #ffd535; }
        #send-btn:active { transform: scale(0.95); }
        #send-btn:disabled { background: var(--surface3); cursor: not-allowed; }

        .error-msg { color: #f87171; font-size: 13px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="header-icon">🗓</div>
        <div class="header-text">
            <h1>CyberPlanner</h1>
            <p>Gestor de Rotina com IA</p>
        </div>
        <div class="status-dot" title="Online"></div>
    </div>

    <div class="chat-box" id="chat-box">
        <div class="message-row">
            <div class="avatar ai">CP</div>
            <div class="bubble ai-msg">Olá! Sou o <strong>CyberPlanner</strong>, seu gestor de rotina inteligente. Me conte seus compromissos, horários e preferências — vou organizar tudo sem conflitos e gerar sua tabela de rotina.</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ex: Tenho aula às 8h, academia às 18h..." autocomplete="off">
        <button id="send-btn" onclick="enviarMensagem()" title="Enviar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    // URL base da API — altere aqui se mudar a porta ou o host
    const API_URL = "http://localhost:8000/chat";

    // Histórico da conversa mantido no frontend
    const historico = [];

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    function addRow(role, htmlContent, isTyping = false) {
        const chatBox = document.getElementById("chat-box");
        const isUser = role === "user";

        const row = document.createElement("div");
        row.className = "message-row" + (isUser ? " user" : "");
        if (isTyping) row.id = "typing-row";

        const avatar = document.createElement("div");
        avatar.className = "avatar " + (isUser ? "usr" : "ai");
        avatar.textContent = isUser ? "Eu" : "CP";

        const bubble = document.createElement("div");
        bubble.className = "bubble " + (isUser ? "user-msg" : "ai-msg");
        bubble.innerHTML = htmlContent;

        row.appendChild(avatar);
        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
        return row;
    }

    async function enviarMensagem() {
        const inputField = document.getElementById("user-input");
        const sendBtn   = document.getElementById("send-btn");
        const pergunta  = inputField.value.trim();
        if (!pergunta) return;

        // Exibe a mensagem do usuário (escapada para evitar XSS)
        addRow("user", escapeHtml(pergunta));
        historico.push({ role: "user", text: pergunta });
        inputField.value = "";
        sendBtn.disabled = true;

        // Indicador de digitação
        addRow("model", '<div class="typing-dots"><span></span><span></span><span></span></div>', true);

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    pergunta: pergunta,
                    historico: historico.slice(0, -1), // envia histórico anterior (sem a pergunta atual)
                    modo: "gestor"
                })
            });

            const data = await response.json();

            // Remove o indicador de digitação
            const typingRow = document.getElementById("typing-row");
            if (typingRow) typingRow.remove();

            if (!response.ok) {
                addRow("model", `<span class="error-msg">Erro ${response.status}: ${escapeHtml(data.detail || "Erro desconhecido")}</span>`);
                historico.pop();
            } else {
                const respostaHtml = marked.parse(data.resposta);
                addRow("model", respostaHtml);
                historico.push({ role: "model", text: data.resposta });
            }

        } catch (err) {
            const typingRow = document.getElementById("typing-row");
            if (typingRow) typingRow.remove();
            addRow("model", '<span class="error-msg">Não foi possível conectar ao servidor. Verifique se o Uvicorn está rodando com <code>uvicorn main:app --reload</code></span>');
            historico.pop();
        }

        sendBtn.disabled = false;
        inputField.focus();
    }

    document.getElementById("user-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter" && !e.shiftKey) enviarMensagem();
    });
</script>
</body>
</html>
